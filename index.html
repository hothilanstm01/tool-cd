<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A&E Vietnam — INV/PKL Processor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap');
  :root{--bg:#08080f;--bg2:#0d0d1a;--bg3:#111125;--border:#1c1c35;--purple:#7c6ff7;--cyan:#38d8c8;--yellow:#f0c060;--green:#7fdd9a;--red:#ff6060;--text:#e0e0ee;--muted:#555577}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  header{border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.015)}
  .logo{width:40px;height:40px;background:linear-gradient(135deg,var(--purple),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .header-text .title{font-size:18px;font-weight:800}
  .header-text .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
  .container{max-width:960px;margin:0 auto;padding:32px 24px}
  .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:600px){.upload-grid{grid-template-columns:1fr}}
  .drop-zone{border:2px dashed rgba(124,111,247,0.35);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.02)}
  .drop-zone.inv-zone{border-color:rgba(124,111,247,0.35)}
  .drop-zone.pkl-zone{border-color:rgba(56,216,200,0.35)}
  .drop-zone.inv-zone:hover,.drop-zone.inv-zone.dragover{border-color:var(--purple);background:rgba(124,111,247,0.07)}
  .drop-zone.pkl-zone:hover,.drop-zone.pkl-zone.dragover{border-color:var(--cyan);background:rgba(56,216,200,0.07)}
  .drop-zone.inv-zone.has-file{border-style:solid;border-color:var(--purple)}
  .drop-zone.pkl-zone.has-file{border-style:solid;border-color:var(--cyan)}
  .drop-icon{font-size:32px;margin-bottom:8px}
  .drop-label{font-size:13px;font-weight:700;letter-spacing:0.5px;margin-bottom:4px}
  .inv-zone .drop-label{color:var(--purple)}
  .pkl-zone .drop-label{color:var(--cyan)}
  .drop-hint{font-size:11px;color:var(--muted)}
  .drop-filename{font-size:11px;color:var(--cyan);font-family:'JetBrains Mono',monospace;margin-top:8px;line-height:1.8}
  .btn-clear{margin-top:8px;padding:4px 12px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.35);border-radius:6px;color:var(--red);font-size:11px;cursor:pointer;transition:background 0.15s}
  .btn-clear:hover{background:rgba(255,80,80,0.22)}
  .btn-row{display:flex;gap:12px;align-items:center;margin-top:20px}
  .btn-process{flex:1;padding:15px 32px;background:linear-gradient(135deg,var(--purple),#5a52d5);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.3px}
  .btn-process:disabled{opacity:0.35;cursor:not-allowed}
  .btn-process:not(:disabled):hover{opacity:0.88}
  .btn-reset{padding:15px 20px;background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.3);border-radius:10px;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn-reset:hover{background:rgba(255,80,80,0.18)}
  .loading-bar{height:3px;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:2px;animation:slide 1.2s infinite}
  @keyframes slide{0%{margin-left:0;width:30%}50%{margin-left:40%;width:40%}100%{margin-left:100%;width:0}}
  .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
  .stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
  .stat-val{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}
  .stat-label{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
  .c-purple .stat-val{color:var(--purple)}.c-cyan .stat-val{color:var(--cyan)}.c-yellow .stat-val{color:var(--yellow)}.c-green .stat-val{color:var(--green)}
  .result-section{margin-top:24px}
  .btn-export{width:100%;padding:13px;margin-bottom:14px;background:rgba(56,216,200,0.08);border:1px solid rgba(56,216,200,0.3);border-radius:10px;color:var(--cyan);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.5px}
  .btn-export:hover{background:rgba(56,216,200,0.15)}
  .table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:var(--bg2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:11px 13px;text-align:left;border-bottom:1px solid var(--border)}
  td{padding:9px 13px;border-bottom:1px solid rgba(28,28,53,0.6);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,0.02)}
  .td-desc{font-family:'JetBrains Mono',monospace;font-size:11px;max-width:200px}
  .td-num{font-family:'JetBrains Mono',monospace;color:var(--cyan)}
  .td-price{font-family:'JetBrains Mono',monospace;color:var(--yellow)}
  .td-trj{font-family:'JetBrains Mono',monospace;color:#ffaa66;font-weight:700}
  .td-hs{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)}
  .td-none{color:var(--muted)}
  .tfoot-row td{background:var(--bg2);font-weight:800;border-top:1px solid var(--border)}
  .tfoot-label{color:var(--muted);font-size:11px}
  .error-box{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.3);border-radius:10px;padding:14px 18px;color:#ff9090;font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:16px;white-space:pre-wrap;line-height:1.8}
  .warn-box{margin-bottom:12px;padding:12px 16px;background:rgba(240,192,96,0.07);border:1px solid rgba(240,192,96,0.25);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#c09040;line-height:1.8;white-space:pre-wrap}
  .debug-box{margin-bottom:12px;padding:12px 16px;background:rgba(124,111,247,0.06);border:1px solid rgba(124,111,247,0.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#8880cc;line-height:1.8;white-space:pre-wrap}
</style>
</head>
<body>
<header>
  <div class="logo">🧵</div>
  <div class="header-text">
    <div class="sub">A&amp;E Vietnam Thread LLC</div>
    <div class="title">INV / PKL Processor</div>
  </div>
  <div style="margin-left:auto;font-size:11px;color:#555577;font-family:'JetBrains Mono',monospace">© 2026 hothilan01. All rights reserved.</div>
</header>
<div class="container">
  <div class="upload-grid">
    <div class="drop-zone inv-zone" id="invZone" onclick="document.getElementById('invInput').click()">
      <input type="file" id="invInput" accept=".xlsx,.xls,.xlsm" style="display:none" multiple onchange="handleFile('inv',this)"/>
      <div class="drop-icon" id="invIcon">📋</div>
      <div class="drop-label">INV FILES</div>
      <div class="drop-hint" id="invHint">Kéo thả hoặc click — nhiều file</div>
      <div class="drop-filename" id="invNames" style="display:none"></div>
      <button class="btn-clear" id="invClear" style="display:none" onclick="clearZone('inv',event)">✕ Xóa</button>
    </div>
    <div class="drop-zone pkl-zone" id="pklZone" onclick="document.getElementById('pklInput').click()">
      <input type="file" id="pklInput" accept=".xlsx,.xls,.xlsm" style="display:none" multiple onchange="handleFile('pkl',this)"/>
      <div class="drop-icon" id="pklIcon">📦</div>
      <div class="drop-label">PKL FILES</div>
      <div class="drop-hint" id="pklHint">Kéo thả hoặc click — nhiều file</div>
      <div class="drop-filename" id="pklNames" style="display:none"></div>
      <button class="btn-clear" id="pklClear" style="display:none" onclick="clearZone('pkl',event)">✕ Xóa</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-process" id="processBtn" onclick="processFiles()" disabled>⚡ &nbsp;XỬ LÝ &amp; TẠO OUTPUT</button>
    <button class="btn-reset" onclick="resetAll()">🗑 &nbsp;RESET</button>
  </div>
  <div id="loadingBar" style="display:none;margin-top:16px"><div class="loading-bar"></div></div>
  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="results" class="result-section" style="display:none"></div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let invFiles = [], pklFiles = [], lastResult = null;

function handleFile(type, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  if (type === 'inv') {
    files.forEach(f => { if (!invFiles.find(x => x.name===f.name)) invFiles.push(f); });
    document.getElementById('invIcon').textContent = '✅';
    document.getElementById('invHint').style.display = 'none';
    document.getElementById('invNames').innerHTML = invFiles.map(f=>'✓ '+f.name).join('<br>');
    document.getElementById('invNames').style.display = 'block';
    document.getElementById('invClear').style.display = 'inline-block';
    document.getElementById('invZone').classList.add('has-file');
  } else {
    files.forEach(f => { if (!pklFiles.find(x => x.name===f.name)) pklFiles.push(f); });
    document.getElementById('pklIcon').textContent = '✅';
    document.getElementById('pklHint').style.display = 'none';
    document.getElementById('pklNames').innerHTML = pklFiles.map(f=>'✓ '+f.name).join('<br>');
    document.getElementById('pklNames').style.display = 'block';
    document.getElementById('pklClear').style.display = 'inline-block';
    document.getElementById('pklZone').classList.add('has-file');
  }
  document.getElementById('processBtn').disabled = !(invFiles.length && pklFiles.length);
}

function clearZone(type, e) {
  e.stopPropagation();
  if (type === 'inv') {
    invFiles = [];
    document.getElementById('invInput').value = '';
    document.getElementById('invIcon').textContent = '📋';
    document.getElementById('invHint').style.display = '';
    document.getElementById('invNames').style.display = 'none';
    document.getElementById('invClear').style.display = 'none';
    document.getElementById('invZone').classList.remove('has-file');
  } else {
    pklFiles = [];
    document.getElementById('pklInput').value = '';
    document.getElementById('pklIcon').textContent = '📦';
    document.getElementById('pklHint').style.display = '';
    document.getElementById('pklNames').style.display = 'none';
    document.getElementById('pklClear').style.display = 'none';
    document.getElementById('pklZone').classList.remove('has-file');
  }
  document.getElementById('processBtn').disabled = !(invFiles.length && pklFiles.length);
}

function resetAll() {
  clearZone('inv', { stopPropagation:()=>{} });
  clearZone('pkl', { stopPropagation:()=>{} });
  lastResult = null;
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('errorBox').style.display = 'none';
}

// Drag & Drop
['invZone','pklZone'].forEach(id => {
  const el = document.getElementById(id);
  const type = id === 'invZone' ? 'inv' : 'pkl';
  const inputId = type === 'inv' ? 'invInput' : 'pklInput';
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('dragover');
    const dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
    document.getElementById(inputId).files = dt.files;
    handleFile(type, document.getElementById(inputId));
  });
});

// ── Parse INV ─────────────────────────────────────────────────────────────────
function parseINV(wb) {
  const debug = [];
  // Scan all sheets, find one with SE No + Description + Unit Price
  for (const sn of wb.SheetNames) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, defval:null });
    for (let hi = 0; hi < Math.min(rows.length, 60); hi++) {
      const r = rows[hi]; if (!r) continue;
      const strs = r.map(c => c != null ? String(c).trim() : '');
      const hasSE    = strs.some(s => /SE\s*No/i.test(s));
      const hasDesc  = strs.some(s => /Description/i.test(s));
      const hasPrice = strs.some(s => /Unit\s*Price/i.test(s));
      if (!hasSE || !hasDesc || !hasPrice) continue;

      // Map columns
      const ic = {};
      strs.forEach((s,i) => {
        if (/SE\s*No/i.test(s) && !ic.seNo)                              ic.seNo = i;
        if (/Description/i.test(s) && !ic.desc)                          ic.desc = i;
        if (/A&E\s*item/i.test(s) && !/Customer/i.test(s) && !ic.aeItem) ic.aeItem = i;
        if ((/Customer.*(Item|item)/i.test(s) || /Cust.*Item/i.test(s)) && !/Color/i.test(s) && !/PO/i.test(s) && !ic.custItem) ic.custItem = i;
        if (/Unit\s*Price/i.test(s) && !ic.price)                        ic.price = i;
      });
      const invHeaderDump = strs.filter(s=>s).map((s,_,__)=>s.replace(/\n/g,'↵')).join(' | ');
      debug.push('INV sheet=' + sn + ' row=' + (hi+1) + ' headers=[' + invHeaderDump + ']');
      debug.push('INV mapped cols=' + JSON.stringify(ic));

      const data = [], k2k1 = {};
      for (let i = hi+1; i < rows.length; i++) {
        const r2 = rows[i]; if (!r2) continue;
        const desc  = r2[ic.desc];
        const price = parseFloat(r2[ic.price]);
        if (!desc || !price || price <= 0) continue;
        const seNo     = String(r2[ic.seNo]     ?? '').trim();
        const aeItem   = String(r2[ic.aeItem]   ?? '').trim();
        const custItem = String(r2[ic.custItem] ?? '').trim();
        const key1 = String(desc).trim() + '@' + price;
        const d = String(desc).trim();
        // Store multiple key2 variants to handle different file formats
        const key2_full  = seNo + '_' + d + '_' + aeItem + '_' + custItem;
        const key2_no4   = seNo + '_' + d + '_' + aeItem + '_';   // custItem empty
        const key2_no34  = seNo + '_' + d + '_' + '_';            // no aeItem no custItem
        k2k1[key2_full] = key1;
        k2k1[key2_no4]  = key1;  // fallback: match even if custItem missing
        k2k1[key2_no34] = key1;  // fallback: match by seNo+desc only
        data.push({ seNo, desc: d, aeItem, custItem, price, key1, key2: key2_full });
      }
      debug.push('INV rows=' + data.length + ' k2k1 entries=' + Object.keys(k2k1).length);
      return { data, k2k1, debug };
    }
  }
  throw new Error('INV: Không tìm thấy header\nSheets: ' + wb.SheetNames.join(', '));
}

// ── Parse PKL ─────────────────────────────────────────────────────────────────
function parsePKL(wb) {
  const debug = [];
  // Scan all sheets, find one with SE No + Description + Qty + NW
  for (const sn of wb.SheetNames) {
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, defval:null });
    for (let hi = 0; hi < Math.min(rows.length, 60); hi++) {
      const r = rows[hi]; if (!r) continue;
      const strs = r.map(c => c != null ? String(c).trim() : '');
      const hasSE   = strs.some(s => /SE\s*No/i.test(s));
      const hasDesc = strs.some(s => /Description/i.test(s));
      const hasQty  = strs.some(s => /^Qty$|^Quantity$/i.test(s));
      const hasNW   = strs.some(s => /^NW/i.test(s) && !/GW/i.test(s));
      if (!hasSE || !hasDesc || (!hasQty && !hasNW)) continue;

      // Map columns
      const pc = {};
      strs.forEach((s,i) => {
        if (/SE\s*No/i.test(s) && !pc.seNo)                              pc.seNo = i;
        if (/Description/i.test(s) && !pc.desc)                          pc.desc = i;
        if (/A&E\s*item/i.test(s) && !/Code/i.test(s) && !pc.aeItem)    pc.aeItem = i;
        if (/Customer\s*Item\s*Color/i.test(s) && !pc.custItemColor)    pc.custItemColor = i;
        if (/Customer\s*Item/i.test(s) && !/Color/i.test(s) && !pc.custItem) pc.custItem = i;
        if (/Customer\s*Inf/i.test(s) && !pc.custInfo)                   pc.custInfo = i;
        if (/Item\s*Num|Item\s*No\.?$/i.test(s) && !pc.itemNo)         pc.itemNo = i;
        if (/^Qty$|^Quantity$/i.test(s) && !pc.qty)                       pc.qty = i;
        if (/^NW/i.test(s) && !/GW/i.test(s) && !pc.nw)                  pc.nw = i;
        if (/^GW/i.test(s) && !pc.gw)                                     pc.gw = i;
        if (/SO_Carton|Combine_SO|^Combine$/i.test(s) && !pc.cartonId)    pc.cartonId = i;
        if (/Original\s*Country/i.test(s) && !pc.country)                pc.country = i;
      });
      const pklHeaderDump = strs.filter(s=>s).map(s=>s.replace(/\n/g,'↵')).join(' | ');
      debug.push('PKL sheet=' + sn + ' row=' + (hi+1) + ' headers=[' + pklHeaderDump + ']');
      debug.push('PKL mapped cols=' + JSON.stringify(pc));

      if (pc.qty == null && pc.nw == null) continue; // need at least qty or nw

      const data = [];
      let prevSeNo = '';
      for (let i = hi+1; i < rows.length; i++) {
        const r2 = rows[i]; if (!r2) continue;
        const desc = r2[pc.desc];
        const qty  = parseFloat(r2[pc.qty]);
        if (!desc || !qty || qty <= 0) continue;

        const seNoRaw = r2[pc.seNo];
        if (seNoRaw != null && String(seNoRaw).trim()) prevSeNo = String(seNoRaw).trim();
        const seNoINV = prevSeNo.substring(0, 8).trim();

        const aeItem        = String(r2[pc.aeItem]        ?? '').trim();
        // Key slot 4: prefer custItemColor, then custItem, then custInfo
        const slot4 = (pc.custItemColor != null ? String(r2[pc.custItemColor] ?? '') :
                       pc.custItem      != null ? String(r2[pc.custItem]      ?? '') :
                       pc.custInfo      != null ? String(r2[pc.custInfo]      ?? '') : '').trim();
        // Also try itemNo as fallback for aeItem slot
        const aeSlot = aeItem || (pc.itemNo != null ? String(r2[pc.itemNo] ?? '').trim() : '');

        const nw      = parseFloat(r2[pc.nw]) || 0;
        const country = pc.country != null ? String(r2[pc.country] ?? '').trim() : '';
        const key2    = seNoINV + '_' + String(desc).trim() + '_' + aeSlot + '_' + slot4;

        const gw       = parseFloat(r2[pc.gw]) || 0;
        const cartonId = pc.cartonId != null ? String(r2[pc.cartonId] ?? '').trim() : '';
        data.push({ desc: String(desc).trim(), qty, nw, gw, cartonId, seNoINV, key2, country });
      }
      debug.push('PKL rows=' + data.length);

      // Read TOTAL CARTON and GROSS WEIGHT directly from summary rows
      // Pattern: row has 'TOTAL' and 'CARTON' as separate cells → number is between them
      //          row has 'GROSS WEIGHT' as a cell → number is next non-empty cell
      let totalCartons = 0, totalGW = 0;
      for (let i = 0; i < rows.length; i++) {
        const r = rows[i]; if (!r) continue;
        const strs = r.map(c => c != null ? String(c).trim().toUpperCase() : '');

        // Find TOTAL...number...CARTON on same row
        const rowText = strs.join(' ');
        if (rowText.includes('TOTAL') && rowText.includes('CARTON') && !rowText.includes('GROSS')) {
          debug.push('CARTON ROW raw: ' + JSON.stringify(r));
          for (let j = 0; j < r.length; j++) {
            const v = parseFloat(r[j]);
            if (!isNaN(v) && v > 0 && r[j] !== null && r[j] !== undefined && String(r[j]).trim() !== '') { 
              totalCartons += v; 
              debug.push('CARTON found: ' + v);
              break; 
            }
          }
        }

        // Find GROSS WEIGHT row
        if (rowText.includes('GROSS') && rowText.includes('WEIGHT')) {
          debug.push('GW ROW raw: ' + JSON.stringify(r));
          for (let j = 0; j < r.length; j++) {
            const v = parseFloat(r[j]);
            if (!isNaN(v) && v > 0 && r[j] !== null && r[j] !== undefined && String(r[j]).trim() !== '') { 
              totalGW += v; 
              debug.push('GW found: ' + v);
              break; 
            }
          }
        }
      }

      return { data, totalCartons, totalGW, debug };
    }
  }
  throw new Error('PKL: Không tìm thấy header\nSheets: ' + wb.SheetNames.join(', '));
}

// ── Compute Output ────────────────────────────────────────────────────────────
function computeOutput(invResult, pklResult) {
  const { k2k1 } = invResult;
  const debug = [...invResult.debug, ...pklResult.debug];

  const outputMap = {};
  let matched = 0;
  pklResult.data.forEach(r => {
    // Try full key2 first, then progressively simpler fallbacks
    const parts   = r.key2.split('_');
    const key2_no4  = parts.slice(0,3).join('_') + '_';
    const key2_no34 = parts.slice(0,2).join('_') + '__';
    const invK1 = k2k1[r.key2] || k2k1[key2_no4] || k2k1[key2_no34] || '';
    if (!invK1) return;
    matched++;
    const key1 = invK1 + '@' + r.country;
    if (!outputMap[key1]) outputMap[key1] = { qty:0, nw:0 };
    outputMap[key1].qty += r.qty;
    outputMap[key1].nw  += r.nw;
  });

  debug.push('Matched=' + matched + ' Output items=' + Object.keys(outputMap).length);

  if (Object.keys(outputMap).length === 0) {
    // Show sample keys for diagnosis
    const samplePKL = pklResult.data.length ? pklResult.data[0].key2 : 'N/A';
    const sampleINV = Object.keys(k2k1).length ? Object.keys(k2k1)[0] : 'N/A';
    debug.push('Sample PKL Key2: ' + samplePKL);
    debug.push('Sample INV Key2: ' + sampleINV);
    throw new Error('Không match được INV ↔ PKL\n\n' + debug.join('\n'));
  }

  // Total cartons and GW — read directly from PKL summary rows
  const totalCartons = pklResult.totalCartons || 0;
  const totalGW = pklResult.totalGW || 0;

  const rows = Object.entries(outputMap).map(([key1, agg]) => {
    const parts     = key1.split('@');
    const desc      = parts[0].trim();
    const unitPrice = parseFloat(parts[1]) || 0;
    const bcct      = BCCT[desc];
    return {
      key1, desc, unitPrice,
      hsCode:    bcct ? bcct.hs  : '',
      tenHang:   bcct ? bcct.name.replace(/#&VN/g,'').replace(/#&CN/g,'').trim() : '',
      qty:       agg.qty,
      netWeight: agg.nw,
      hasBcct:   !!bcct
    };
  });

  return {
    rows,
    totalQty: rows.reduce((s,r) => s+r.qty, 0),
    totalNW:  rows.reduce((s,r) => s+r.netWeight, 0),
    totalCartons,
    totalGW,
    debug
  };
}

// ── Export Excel ──────────────────────────────────────────────────────────────
function exportExcel() {
  if (!lastResult) return;
  const { rows } = lastResult;
  const wb = XLSX.utils.book_new();
  const ws = {};

  // Columns: C=Tên hàng, D=HS Code, E=Lượng 1, F=Đơn vị lượng 1, G=Net Weight, H=Đơn vị 2, I=Unit Price, J=Trị giá
  // Data starts at C2 (no header row)
  rows.forEach((r, idx) => {
    const row = idx + 2; // start from row 2
    ws['C' + row] = { t: 's', v: r.tenHang };
    ws['D' + row] = { t: 's', v: r.hsCode };
    ws['E' + row] = { t: 'n', v: r.qty };
    ws['F' + row] = { t: 's', v: 'ROL' };
    ws['G' + row] = { t: 'n', v: +r.netWeight.toFixed(3) };
    ws['H' + row] = { t: 's', v: 'KGM' };
    ws['I' + row] = { t: 'n', v: r.unitPrice };
    ws['J' + row] = { t: 'n', f: 'E' + row + '*I' + row };
  });

  // Set sheet range
  const lastRow = rows.length + 1;
  ws['!ref'] = 'C2:J' + lastRow;
  ws['!cols'] = [
    null, null,                      // A, B empty
    {wch:80}, {wch:12}, {wch:12}, {wch:10}, {wch:14}, {wch:10}, {wch:16}, {wch:18}
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'output');
  XLSX.writeFile(wb, 'book.xlsx');
}

// ── Process ───────────────────────────────────────────────────────────────────
async function processFiles() {
  const errEl  = document.getElementById('errorBox');
  const resEl  = document.getElementById('results');
  const loadEl = document.getElementById('loadingBar');
  errEl.style.display = 'none';
  resEl.style.display = 'none';
  loadEl.style.display = 'block';
  document.getElementById('processBtn').disabled = true;

  try {
    const readBuf = f => new Promise((res,rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsArrayBuffer(f);
    });

    // Parse all INV files → merge
    const invK2K1_merged = {}, invData_merged = [];
    const invDebug = [];
    for (const f of invFiles) {
      const buf = await readBuf(f);
      const wb  = XLSX.read(buf, { type:'array' });
      const res = parseINV(wb);
      invDebug.push(...res.debug);
      Object.assign(invK2K1_merged, res.k2k1);
      invData_merged.push(...res.data);
    }
    const invResult = { data: invData_merged, k2k1: invK2K1_merged, debug: invDebug };

    // Parse all PKL files → merge
    const pklData_merged = [];
    const pklDebug = [];
    let pklTotalCartons = 0, pklTotalGW = 0;
    for (const f of pklFiles) {
      const buf = await readBuf(f);
      const wb  = XLSX.read(buf, { type:'array' });
      const res = parsePKL(wb);
      pklDebug.push(...res.debug);
      pklData_merged.push(...res.data);
      pklTotalCartons += res.totalCartons || 0;
      pklTotalGW      += res.totalGW      || 0;
    }
    const pklResult = { data: pklData_merged, debug: pklDebug, totalCartons: pklTotalCartons, totalGW: pklTotalGW };

    const output = computeOutput(invResult, pklResult);
    lastResult = output;

    const { rows, totalQty, totalNW } = output;
    const totalTriGia  = rows.reduce((s,r) => s + r.qty * r.unitPrice, 0);
    const missingBcct  = rows.filter(r => !r.hasBcct);

    const { totalCartons = 0, totalGW = 0 } = output;
    const statsHtml = `<div class="stats-grid">
      <div class="stat-card c-purple"><div class="stat-val">${rows.length}</div><div class="stat-label">Mặt hàng</div></div>
      <div class="stat-card c-cyan"><div class="stat-val">${totalQty.toLocaleString()}</div><div class="stat-label">Tổng Qty (ROL)</div></div>
      <div class="stat-card c-yellow"><div class="stat-val">${(totalNW||0).toFixed(2)}</div><div class="stat-label">Total NW (KG)</div></div>
      <div class="stat-card c-green"><div class="stat-val">${(totalGW||0).toFixed(2)}</div><div class="stat-label">Total GW (KG)</div></div>
      <div class="stat-card c-purple"><div class="stat-val">${totalCartons}</div><div class="stat-label">Total Carton</div></div>
    </div>`;

    const debugHtml = `<div class="debug-box">🔍 Debug:
${output.debug.join('\n')}</div>`;
    const warnHtml  = missingBcct.length ? `<div class="warn-box">⚠ ${missingBcct.length} mặt hàng chưa có trong BCCT:\n${missingBcct.map(r=>'• '+r.desc).join('\n')}</div>` : '';

    const tableRows = rows.map(r => `<tr>
      <td class="td-desc">${esc(r.desc)}</td>
      <td class="td-hs">${r.hsCode||'<span class="td-none">—</span>'}</td>
      <td class="td-num">${r.qty.toLocaleString()}</td>
      <td class="td-num">${r.netWeight.toFixed(3)}</td>
      <td style="color:#88bbff;font-family:'JetBrains Mono',monospace;font-size:11px">KGM</td>
      <td class="td-price">${r.unitPrice.toLocaleString()}</td>
      <td class="td-trj">${(r.qty*r.unitPrice).toLocaleString('vi-VN')}</td>
    </tr>`).join('');

    resEl.innerHTML = statsHtml + debugHtml + warnHtml + `
      <button class="btn-export" onclick="exportExcel()">⬇ &nbsp;EXPORT EXCEL &nbsp;(book.xlsx)</button>
      <div class="table-wrap"><div class="table-scroll"><table>
        <thead><tr>
          <th>Description 1</th><th>HS Code</th>
          <th>Lượng 1 (ROL)</th><th>Net Weight (KG)</th>
          <th>Đơn vị 2</th><th>Unit Price (VND)</th><th>Trị giá (VND)</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr class="tfoot-row">
          <td class="tfoot-label" colspan="2">TOTAL</td>
          <td class="td-num">${totalQty.toLocaleString()}</td>
          <td class="td-num">${totalNW.toFixed(3)}</td>
          <td></td><td></td>
          <td class="td-trj">${totalTriGia.toLocaleString('vi-VN')}</td>
        </tr></tfoot>
      </table></div></div>`;
    resEl.style.display = 'block';

  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.style.display = 'block';
  }
  loadEl.style.display = 'none';
  document.getElementById('processBtn').disabled = false;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
